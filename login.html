<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login - Website Vault</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(135deg,#0f2d4a,#1f4e79);
  overflow:hidden;
  position:relative;
}

/* floating background glow */
body::before,
body::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
}

body::before{
  background:#ff8c42;
  top:-50px;
  left:-80px;
}

body::after{
  background:#00c2a8;
  bottom:-80px;
  right:-60px;
}

/* LOGIN BOX */
.login-box{
  width:360px;
  background:rgba(255,255,255,0.95);
  padding:35px 30px;
  border-radius:16px;

  box-shadow:0 20px 50px rgba(0,0,0,0.25);

  backdrop-filter:blur(10px);
  z-index:2;

  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{
    transform:translateY(20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

.title{
  text-align:center;
  margin-bottom:25px;
}

.title h2{
  color:#0f2d4a;
  font-size:24px;
}

.title p{
  font-size:13px;
  color:#777;
  margin-top:5px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px 14px;
  margin:10px 0;
  border:1px solid #e5e7eb;
  border-radius:10px;
  outline:none;
  font-size:14px;
  transition:0.2s;
}

input:focus{
  border-color:#1f4e79;
  box-shadow:0 0 0 3px rgba(31,78,121,0.15);
}

/* BUTTON */
button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;

  background:linear-gradient(135deg,#ff8c42,#ff6b1a);
  color:white;

  font-size:15px;
  font-weight:600;

  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 10px 20px rgba(255,140,66,0.3);
}

/* ERROR */
.error{
  text-align:center;
  color:#e63946;
  font-size:13px;
  margin-top:10px;
  min-height:18px;
}

/* small footer text */
.footer-text{
  text-align:center;
  margin-top:15px;
  font-size:11px;
  color:#888;
}
</style>
</head>

<body>

<div class="login-box">

  <div class="title">
    <h2>Admin Login</h2>
    <p>Website Vault Control Panel</p>
  </div>

  <input type="text" id="username" placeholder="Admin ID">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>

  <div class="footer-text">
    Secure Access Only
  </div>

</div>

<script>

const ADMIN_ID = "Balaji@megamart";
const ADMIN_PASS = "Anuj@7878"; // change later

function login(){

  let id = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  if(id === ADMIN_ID && pass === ADMIN_PASS){

    sessionStorage.setItem("adminLoggedIn","true");

    // smooth redirect effect
    document.querySelector(".login-box").style.transform = "scale(0.9)";
    document.querySelector(".login-box").style.opacity = "0";

    setTimeout(()=>{
      window.location.href = "admin.html";
    },500);

  } else {
    document.getElementById("error").innerText = "Invalid Admin Credentials";
  }
}

</script>

</body>
</html>
