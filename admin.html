<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Vault Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#070b17;
--card:rgba(255,255,255,.06);
--border:rgba(255,255,255,.1);
--text:#fff;
--muted:#94a3b8;
--primary:#7c3aed;
--secondary:#06b6d4;
--danger:#ef4444;
--success:#10b981;
--shadow:0 20px 50px rgba(0,0,0,.4);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#070b17;
color:white;
min-height:100vh;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(124,58,237,.3),transparent 30%),
radial-gradient(circle at 80% 20%,rgba(6,182,212,.25),transparent 30%),
radial-gradient(circle at 50% 80%,rgba(236,72,153,.15),transparent 35%);
z-index:-1;
}

.container{
width:min(1500px,95%);
margin:auto;
padding:25px 0;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:28px;
font-weight:800;
background:linear-gradient(90deg,#7c3aed,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.actions{
display:flex;
gap:10px;
}

.btn{
border:none;
cursor:pointer;
padding:12px 18px;
border-radius:12px;
font-weight:600;
color:white;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
}

.btn-danger{
background:#ef4444;
}

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:25px;
}

.panel{
background:var(--card);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:24px;
padding:24px;
box-shadow:var(--shadow);
}

.panel-title{
font-size:20px;
font-weight:700;
margin-bottom:20px;
}

.form-group{
margin-bottom:16px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#cbd5e1;
}

input,
textarea,
select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.04);
color:white;
outline:none;
}

textarea{
resize:vertical;
min-height:120px;
}

.save-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
color:white;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:rgba(255,255,255,.06);
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.site-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.site-card:hover{
transform:translateY(-5px);
}

.site-card img{
width:100%;
height:190px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card-title{
font-size:20px;
font-weight:700;
margin-bottom:8px;
}

.card-category{
display:inline-block;
padding:6px 12px;
border-radius:50px;
background:rgba(124,58,237,.2);
margin-bottom:10px;
font-size:12px;
}

.card-desc{
font-size:13px;
color:#cbd5e1;
margin-bottom:14px;
line-height:1.6;
}

.card-actions{
display:flex;
gap:10px;
}

.edit-btn,
.delete-btn,
.visit-btn{
flex:1;
padding:10px;
border:none;
cursor:pointer;
border-radius:10px;
font-weight:600;
color:white;
}

.edit-btn{
background:#06b6d4;
}

.delete-btn{
background:#ef4444;
}

.visit-btn{
background:#7c3aed;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.stat{
padding:20px;
background:rgba(255,255,255,.05);
border-radius:18px;
text-align:center;
}

.stat h2{
font-size:32px;
}

.stat p{
color:#94a3b8;
}

.file-label{
padding:14px;
border:2px dashed rgba(255,255,255,.15);
border-radius:14px;
text-align:center;
cursor:pointer;
}

input[type=file]{
display:none;
}

@media(max-width:1100px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<div class="container">

<div class="topbar">

<div class="logo">Website Vault Admin</div>

<div class="actions">
<a href="index.html">
<button class="btn">Home Page</button>
</a>
</div>

</div>

<div class="stats">

<div class="stat">
<h2 id="totalSites">0</h2>
<p>Total Websites</p>
</div>

<div class="stat">
<h2 id="totalCategories">0</h2>
<p>Categories</p>
</div>

<div class="stat">
<h2 id="storageCount">0</h2>
<p>Records</p>
</div>

</div>

<div class="grid">

<div class="panel">

<div class="panel-title">Add / Edit Website</div>

<form id="websiteForm">

<input type="hidden" id="websiteId">

<div class="form-group">
<label>Website Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Category</label>
<select id="category" required>
<option value="">Select</option>
<option>Business</option>
<option>E-Commerce</option>
<option>Portfolio</option>
<option>Education</option>
<option>Dashboard</option>
<option>Tools</option>
<option>Agency</option>
<option>Blog</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="form-group">
<label>Live Website URL</label>
<input type="url" id="liveUrl" required>
</div>

<div class="form-group">
<label class="file-label">
Upload Thumbnail
<input type="file" id="thumbnail" accept="image/*">
</label>
</div>

<div class="form-group">
<label class="file-label">
Upload ZIP File
<input type="file" id="zipFile" accept=".zip">
</label>
</div>

<button class="save-btn" type="submit">
Save Website
</button>

</form>

</div>

<div class="panel">

<div class="search">
<input type="text" id="searchInput" placeholder="Search websites...">
</div>

<div class="cards" id="cardsContainer"></div>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://gldbfztlxnkoqwojexjp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZGJmenRseG5rb3F3b2pleGpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjEwODEsImV4cCI6MjA5NTY5NzA4MX0.FkTob0CX1yoJq1kf6mZdJIe9kfFBEHLO3wQ_L5uNmzo";

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

let websites = [];

async function uploadFile(file,path){

const filename =
Date.now() + "_" + file.name;

const fullPath =
path + "/" + filename;

const { error } =
await supabase.storage
.from("website-files")
.upload(fullPath,file);

if(error) throw error;

const { data } =
supabase.storage
.from("website-files")
.getPublicUrl(fullPath);

return data.publicUrl;

}

async function loadWebsites(){

const { data,error } =
await supabase
.from("websites")
.select("*")
.order("created_at",{ascending:false});

if(error){
console.error(error);
return;
}

websites = data || [];

renderCards();
updateStats();

}

function updateStats(){

document.getElementById("totalSites").innerText =
websites.length;

document.getElementById("storageCount").innerText =
websites.length;

const cats =
new Set(websites.map(x=>x.category));

document.getElementById("totalCategories").innerText =
cats.size;

}

function renderCards(search=""){

const container =
document.getElementById("cardsContainer");

container.innerHTML="";

const filtered =
websites.filter(site =>
site.name.toLowerCase().includes(search.toLowerCase()) ||
site.category.toLowerCase().includes(search.toLowerCase())
);

filtered.forEach(site=>{

container.innerHTML += `
<div class="site-card">

<img src="${site.thumbnail_url}">

<div class="card-content">

<div class="card-title">${site.name}</div>

<div class="card-category">${site.category}</div>

<div class="card-desc">${site.description || ""}</div>

<div class="card-actions">

<button class="visit-btn"
onclick="window.open('${site.live_url}','_blank')">
Visit
</button>

<button class="edit-btn"
onclick="editWebsite('${site.id}')">
Edit
</button>

<button class="delete-btn"
onclick="deleteWebsite('${site.id}')">
Delete
</button>

</div>

</div>

</div>
`;

});

}

async function deleteWebsite(id){

if(!confirm("Delete website?"))
return;

await supabase
.from("websites")
.delete()
.eq("id",id);

loadWebsites();

}

function editWebsite(id){

const site =
websites.find(x=>x.id===id);

document.getElementById("websiteId").value =
site.id;

document.getElementById("name").value =
site.name;

document.getElementById("category").value =
site.category;

document.getElementById("description").value =
site.description;

document.getElementById("liveUrl").value =
site.live_url;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

document
.getElementById("websiteForm")
.addEventListener("submit",
async e=>{

e.preventDefault();

try{

const id =
document.getElementById("websiteId").value;

const name =
document.getElementById("name").value;

const category =
document.getElementById("category").value;

const description =
document.getElementById("description").value;

const live_url =
document.getElementById("liveUrl").value;

let thumbnail_url;
let zip_url;

const thumb =
document.getElementById("thumbnail").files[0];

const zip =
document.getElementById("zipFile").files[0];

if(!id){

if(!thumb || !zip){
alert("Upload Thumbnail & ZIP");
return;
}

thumbnail_url =
await uploadFile(
thumb,
"thumbnails"
);

zip_url =
await uploadFile(
zip,
"zips"
);

await supabase
.from("websites")
.insert([{
name,
category,
description,
thumbnail_url,
zip_url,
live_url
}]);

}else{

const site =
websites.find(x=>x.id===id);

thumbnail_url =
site.thumbnail_url;

zip_url =
site.zip_url;

if(thumb){

thumbnail_url =
await uploadFile(
thumb,
"thumbnails"
);

}

if(zip){

zip_url =
await uploadFile(
zip,
"zips"
);

}

await supabase
.from("websites")
.update({
name,
category,
description,
thumbnail_url,
zip_url,
live_url
})
.eq("id",id);

}

document
.getElementById("websiteForm")
.reset();

document
.getElementById("websiteId")
.value="";

loadWebsites();

alert("Saved Successfully");

}catch(err){

console.error(err);
alert(err.message);

}

});

document
.getElementById("searchInput")
.addEventListener("input",
e=>{
renderCards(e.target.value);
});

loadWebsites();

</script>

</body>
</html>
