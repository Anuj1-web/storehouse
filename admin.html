<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Vault Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
   WEBSITE VAULT ADMIN (MATCHED PREMIUM UI)
   OBSIDIAN + GOLD + SAPPHIRE THEME
========================= */

:root{

--bg:#050505;
--bg2:#0b0b0d;

--card:rgba(255,255,255,.035);
--card2:rgba(255,255,255,.05);

--border:rgba(214,179,106,.12);

--text:#ffffff;
--muted:#9aa0a6;

--gold:#d6b36a;
--gold-light:#f4dca2;

--blue:#4f7cff;

--gradient:
linear-gradient(135deg,#d6b36a 0%,#f4dca2 40%,#4f7cff 100%);

--shadow:0 30px 100px rgba(0,0,0,.7);

--radius:22px;

}

/* =========================
   RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
linear-gradient(180deg,#050505 0%,#0b0b10 50%,#111114 100%);

color:var(--text);

min-height:100vh;

overflow-x:hidden;

}

/* =========================
   BACKGROUND GLOW (MATCH INDEX)
========================= */

body::before{

content:"";
position:fixed;
inset:-20%;

background:

radial-gradient(circle at 20% 20%,rgba(214,179,106,.12),transparent 30%),
radial-gradient(circle at 80% 10%,rgba(79,124,255,.10),transparent 28%),
radial-gradient(circle at 50% 90%,rgba(214,179,106,.08),transparent 35%);

pointer-events:none;
z-index:-2;

}

body::after{

content:"";
position:fixed;
inset:0;

backdrop-filter:blur(100px);

background:linear-gradient(180deg,rgba(255,255,255,.01),transparent);

z-index:-1;

}

/* =========================
   CONTAINER
========================= */

.container{
width:min(1500px,92%);
margin:auto;
padding:25px 0;
}

/* =========================
   TOPBAR
========================= */

.topbar{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:25px;

}

.logo{

font-size:28px;
font-weight:900;

background:var(--gradient);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

filter:drop-shadow(0 0 20px rgba(214,179,106,.25));

}

.actions{
display:flex;
gap:10px;
}

/* =========================
   BUTTONS
========================= */

.btn{

border:none;
cursor:pointer;

padding:12px 18px;

border-radius:14px;

font-weight:700;

color:#050505;

background:var(--gradient);

transition:.3s;

}

.btn:hover{
transform:translateY(-3px);
}

.btn-danger{
background:linear-gradient(135deg,#ef4444,#ff6b6b);
color:white;
}

/* =========================
   STATS CARDS
========================= */

.stats{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:15px;

margin-bottom:25px;

}

.stat{

padding:20px;

background:rgba(255,255,255,.03);

border:1px solid rgba(214,179,106,.08);

border-radius:18px;

text-align:center;

backdrop-filter:blur(20px);

}

.stat h2{
font-size:30px;
color:var(--gold-light);
}

.stat p{
font-size:13px;
color:var(--muted);
}

/* =========================
   GRID LAYOUT
========================= */

.grid{

display:grid;
grid-template-columns:420px 1fr;
gap:25px;

}

/* =========================
   PANELS (GLASS EFFECT)
========================= */

.panel{

background:rgba(255,255,255,.03);

border:1px solid rgba(214,179,106,.10);

backdrop-filter:blur(25px);

border-radius:24px;

padding:24px;

box-shadow:var(--shadow);

}

.panel-title{

font-size:18px;
font-weight:800;

margin-bottom:18px;

color:#fff;

}

/* =========================
   FORM ELEMENTS (FIXED DROPDOWN ISSUE)
========================= */

.form-group{
margin-bottom:14px;
}

label{
display:block;
margin-bottom:8px;
font-size:13px;
color:var(--muted);
}

/* INPUTS */
input,
textarea,
select{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid rgba(214,179,106,.12);

background:rgba(0,0,0,.35);

color:white;

outline:none;

font-size:14px;

transition:.3s;

}

/* FIX DROPDOWN VISIBILITY */
select{
background:#0b0b10;
color:white;
}

select option{
background:#0b0b10;
color:white;
}

/* FOCUS */
input:focus,
textarea:focus,
select:focus{

border-color:rgba(214,179,106,.4);

box-shadow:0 0 25px rgba(214,179,106,.15);

}

/* TEXTAREA */
textarea{
min-height:110px;
resize:vertical;
}

/* =========================
   FILE UPLOAD (FIX VISIBILITY + FEEDBACK LOOK)
========================= */

.file-label{

display:block;

padding:14px;

border:1px dashed rgba(214,179,106,.25);

border-radius:14px;

text-align:center;

cursor:pointer;

color:var(--gold-light);

background:rgba(255,255,255,.02);

transition:.3s;

}

.file-label:hover{
background:rgba(214,179,106,.05);
border-color:rgba(214,179,106,.4);
}

input[type=file]{
display:none;
}

/* =========================
   SAVE BUTTON
========================= */

.save-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:800;

background:var(--gradient);

color:#050505;

transition:.3s;

}

.save-btn:hover{
transform:translateY(-3px);
}

/* =========================
   SEARCH
========================= */

.search{
margin-bottom:18px;
}

.search input{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid rgba(214,179,106,.10);

background:rgba(255,255,255,.03);

color:white;

}

/* =========================
   SITE CARDS
========================= */

.cards{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

gap:18px;

}

.site-card{

background:rgba(255,255,255,.03);

border:1px solid rgba(214,179,106,.10);

border-radius:20px;

overflow:hidden;

transition:.3s;

backdrop-filter:blur(20px);

}

.site-card:hover{
transform:translateY(-6px);
border-color:rgba(214,179,106,.25);
}

.site-card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:16px;
}

.card-title{
font-size:18px;
font-weight:800;
margin-bottom:6px;
}

.card-category{

display:inline-block;

padding:6px 12px;

border-radius:999px;

background:rgba(214,179,106,.12);

color:var(--gold-light);

font-size:11px;

margin-bottom:10px;

}

.card-desc{
font-size:13px;
color:var(--muted);
margin-bottom:12px;
line-height:1.6;
}

/* =========================
   ACTION BUTTONS
========================= */

.card-actions{

display:grid;
grid-template-columns:1fr 1fr 1fr;

gap:8px;

}

.edit-btn,
.delete-btn,
.visit-btn{

padding:9px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:700;

font-size:12px;

color:white;

transition:.3s;

}

.edit-btn{
background:linear-gradient(135deg,#06b6d4,#3b82f6);
}

.delete-btn{
background:linear-gradient(135deg,#ef4444,#ff6b6b);
}

.visit-btn{
background:var(--gradient);
color:#050505;
}

.edit-btn:hover,
.delete-btn:hover,
.visit-btn:hover{
transform:translateY(-3px);
}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:1100px){
.grid{
grid-template-columns:1fr;
}
}

@media(max-width:768px){

.stats{
grid-template-columns:1fr;
}

.card-actions{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
gap:12px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="topbar">

<div class="logo">Website Vault Admin</div>

<div class="actions">
<a href="index.html">
<button class="btn">Home Page</button>
</a>
</div>

</div>

<div class="stats">

<div class="stat">
<h2 id="totalSites">0</h2>
<p>Total Websites</p>
</div>

<div class="stat">
<h2 id="totalCategories">0</h2>
<p>Categories</p>
</div>

<div class="stat">
<h2 id="storageCount">0</h2>
<p>Records</p>
</div>

</div>

<div class="grid">

<div class="panel">

<div class="panel-title">Add / Edit Website</div>

<form id="websiteForm">

<input type="hidden" id="websiteId">

<div class="form-group">
<label>Website Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Category</label>
<select id="category" required>
<option value="">Select</option>
<option>Business</option>
<option>E-Commerce</option>
<option>Portfolio</option>
<option>Education</option>
<option>Dashboard</option>
<option>Tools</option>
<option>Agency</option>
<option>Blog</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="form-group">
<label>Live Website URL</label>
<input type="url" id="liveUrl" required>
</div>

<div class="form-group">
<label class="file-label">
Upload Thumbnail
<input type="file" id="thumbnail" accept="image/*">
</label>
</div>

<div class="form-group">
<label class="file-label">
Upload ZIP File
<input type="file" id="zipFile" accept=".zip">
</label>
</div>

<button class="save-btn" type="submit">
Save Website
</button>

</form>

</div>

<div class="panel">

<div class="search">
<input type="text" id="searchInput" placeholder="Search websites...">
</div>

<div class="cards" id="cardsContainer"></div>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://gldbfztlxnkoqwojexjp.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZGJmenRseG5rb3F3b2pleGpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjEwODEsImV4cCI6MjA5NTY5NzA4MX0.FkTob0CX1yoJq1kf6mZdJIe9kfFBEHLO3wQ_L5uNmzo";

/* Use db instead of supabase to avoid conflicts */
const db = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

let websites = [];

/* ---------- FILE UPLOAD ---------- */

async function uploadFile(file, folder){

try{

const fileName =
Date.now() + "_" + file.name;

const filePath =
folder + "/" + fileName;

const { error } =
await db.storage
.from("website-files")
.upload(filePath, file);

if(error){
console.error(error);
alert(error.message);
throw error;
}

const { data } =
db.storage
.from("website-files")
.getPublicUrl(filePath);

return data.publicUrl;

}catch(err){

console.error(err);
throw err;

}

}

/* ---------- LOAD DATA ---------- */

async function loadWebsites(){

try{

const { data, error } =
await db
.from("website-files")
.select("*")
.order("created_at", {
ascending:false
});

if(error){
console.error(error);
alert(error.message);
return;
}

websites = data || [];

renderCards();
updateStats();

}catch(err){

console.error(err);

}

}

/* ---------- STATS ---------- */

function updateStats(){

document.getElementById("totalSites").textContent =
websites.length;

document.getElementById("storageCount").textContent =
websites.length;

const categories =
new Set(websites.map(x => x.category));

document.getElementById("totalCategories").textContent =
categories.size;

}

/* ---------- RENDER ---------- */

function renderCards(search = ""){

const container =
document.getElementById("cardsContainer");

container.innerHTML = "";

const filtered =
websites.filter(site => {

const q =
search.toLowerCase();

return (
(site.name || "")
.toLowerCase()
.includes(q)

||

(site.category || "")
.toLowerCase()
.includes(q)
);

});

if(filtered.length === 0){

container.innerHTML =
"<p style='padding:20px'>No websites found</p>";

return;

}

filtered.forEach(site => {

container.innerHTML += `
<div class="site-card">

<img src="${site.thumbnail_url || ''}" alt="">

<div class="card-content">

<div class="card-title">
${site.name || ''}
</div>

<div class="card-category">
${site.category || ''}
</div>

<div class="card-desc">
${site.description || ''}
</div>

<div class="card-actions">

<button
class="visit-btn"
onclick="window.open('${site.live_url}','_blank')">
Visit
</button>

<button
class="edit-btn"
onclick="editWebsite('${site.id}')">
Edit
</button>

<button
class="delete-btn"
onclick="deleteWebsite('${site.id}')">
Delete
</button>

</div>

</div>

</div>
`;

});

}

/* ---------- DELETE ---------- */

async function deleteWebsite(id){

if(!confirm("Delete website?"))
return;

const { error } =
await db
.from("website-files")
.delete()
.eq("id", id);

if(error){

console.error(error);
alert(error.message);

return;

}

loadWebsites();

}

/* ---------- EDIT ---------- */

function editWebsite(id){

const site =
websites.find(x => x.id == id);

if(!site) return;

document.getElementById("websiteId").value =
site.id;

document.getElementById("name").value =
site.name || "";

document.getElementById("category").value =
site.category || "";

document.getElementById("description").value =
site.description || "";

document.getElementById("liveUrl").value =
site.live_url || "";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* ---------- SAVE ---------- */

document
.getElementById("websiteForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

try{

const id =
document.getElementById("websiteId").value;

const name =
document.getElementById("name").value;

const category =
document.getElementById("category").value;

const description =
document.getElementById("description").value;

const live_url =
document.getElementById("liveUrl").value;

const thumb =
document.getElementById("thumbnail").files[0];

const zip =
document.getElementById("zipFile").files[0];

let thumbnail_url;
let zip_url;

/* NEW RECORD */

if(!id){

if(!thumb || !zip){

alert("Upload Thumbnail & ZIP");

return;

}

thumbnail_url =
await uploadFile(
thumb,
"thumbnails"
);

zip_url =
await uploadFile(
zip,
"zips"
);

const { error } =
await db
.from("website-files")
.insert([{
name,
category,
description,
thumbnail_url,
zip_url,
live_url,
created_at: new Date().toISOString()
}]);
if(error){

console.error(error);
alert(error.message);

return;

}

}

/* UPDATE */

else{

const site =
websites.find(x => x.id == id);

thumbnail_url =
site.thumbnail_url;

zip_url =
site.zip_url;

if(thumb){

thumbnail_url =
await uploadFile(
thumb,
"thumbnails"
);

}

if(zip){

zip_url =
await uploadFile(
zip,
"zips"
);

}

const { error } =
await db
.from("website-files")
.update({
name,
category,
description,
thumbnail_url,
zip_url,
live_url
})
.eq("id", id);

if(error){

console.error(error);
alert(error.message);

return;

}

}

document
.getElementById("websiteForm")
.reset();

document
.getElementById("websiteId")
.value = "";

alert("Saved Successfully");

await loadWebsites();

}catch(err){

console.error(err);
alert(err.message);

}

});

/* ---------- SEARCH ---------- */

document
.getElementById("searchInput")
.addEventListener("input", e => {

renderCards(
e.target.value
);

});

/* ---------- START ---------- */

loadWebsites();

</script>
</body>
</html>
